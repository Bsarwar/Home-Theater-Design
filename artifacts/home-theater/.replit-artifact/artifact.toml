kind = "web"
previewPath = "/"
title = "Home Theater Co."
version = "1.0.0"
id = "artifacts/home-theater"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25624

[services.development]
run = "pnpm --filter @workspace/home-theater run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home-theater", "run", "build" ]
publicDir = "artifacts/home-theater/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/"
to = "/index.html"

[[services.production.rewrites]]
from = "/services"
to = "/services/index.html"

[[services.production.rewrites]]
from = "/projects"
to = "/projects/index.html"

[[services.production.rewrites]]
from = "/awards"
to = "/awards/index.html"

[[services.production.rewrites]]
from = "/about"
to = "/about/index.html"

[[services.production.rewrites]]
from = "/contact"
to = "/contact/index.html"

[services.env]
PORT = "25624"
BASE_PATH = "/"
